name: deploy to EC2

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v3
            
            - name: validate html
              run: |
                sudo apt update
                sudo apt install tidy -y
                tidy -e index.html

            - name: deploy
              uses: appleboy/ssh-action@v0.1.10
              with:
                host: ${{ secrets.HOST }}
                username: ubuntu
                key: ${{ secrets.SSH_KEY }}
                script: |
                  cd /var/www/html/portfolio
                  git pull origin main
                  sudo nginx -t && sudo systemctl reload nginx